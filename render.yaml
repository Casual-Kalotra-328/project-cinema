services:
  # ── FastAPI Backend ───────────────────────────────────────
  - type: web
    name: lumiere-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── React Frontend ────────────────────────────────────────
  - type: web
    name: lumiere-frontend
    runtime: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
